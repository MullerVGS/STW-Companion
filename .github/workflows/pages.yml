name: Build and deploy GitHub Pages

on:
  push:
    branches: [master]
  schedule:
    # STW resets at 00:00 UTC. Avoid the first minutes while Epic rotates data.
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static game dataset
        run: npm run data:build

      - name: Collect current STW rotation
        run: npm run daily:update
        env:
          EPIC_ACCOUNT_ID: ${{ secrets.EPIC_ACCOUNT_ID }}
          EPIC_DEVICE_ID: ${{ secrets.EPIC_DEVICE_ID }}
          EPIC_DEVICE_SECRET: ${{ secrets.EPIC_DEVICE_SECRET }}
          PREVIOUS_HOME_URL: ${{ steps.pages.outputs.base_url }}/data/home.json

      - name: Build web app
        run: npm run web:build
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

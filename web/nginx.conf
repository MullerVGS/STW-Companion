server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # SPA fallback (no server-side routes yet, but future-proof)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed filenames here — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Item icons: stable filenames, long cache.
    location /icons/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Dataset JSON lives at fixed paths and changes on every rebuild — revalidate.
    location /data/ {
        add_header Cache-Control "no-cache";
    }
}
